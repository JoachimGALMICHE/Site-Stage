<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Initialisation Admin — L'Œil d'Euclide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--beige:#F2EDE4;--violet:#1C1C2E;--gold:#B8956A;--line:#D8D0C4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--beige);color:var(--violet);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{max-width:480px;width:100%;padding:0 20px;}
.logo{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;letter-spacing:-2px;color:var(--violet);margin-bottom:8px;}
.sub{font-size:12px;color:#8A8A9A;text-transform:uppercase;letter-spacing:.08em;margin-bottom:40px;}
.warn{background:#FDF6F0;border:1px solid #E8D0B8;border-radius:3px;padding:14px 16px;font-size:13px;color:#7A3A10;margin-bottom:28px;line-height:1.6;}
.warn strong{display:block;margin-bottom:4px;}
label{display:block;font-size:11px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:#8A8A9A;margin-bottom:6px;}
input{display:block;width:100%;border:1px solid var(--line);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;background:var(--beige);color:var(--violet);outline:none;border-radius:2px;transition:border-color .2s;margin-bottom:20px;}
input:focus{border-color:var(--gold);}
button{width:100%;background:var(--violet);color:#fff;border:none;padding:12px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s;}
button:hover{background:#2A2A3E;}
button:disabled{opacity:.5;cursor:not-allowed;}
.msg{display:none;margin-top:16px;padding:12px 16px;border-radius:3px;font-size:13px;border:1px solid;line-height:1.6;}
.msg.ok{background:#EAF5EE;border-color:#B8DEC4;color:#1A5C32;}
.msg.err{background:#FDF3F0;border-color:#E8C4B8;color:#5C2A1A;}
.delete-note{margin-top:24px;font-size:12px;color:#8A8A9A;text-align:center;line-height:1.6;}

/* BURGER MENU */
#burger-btn{background:none;border:none;cursor:pointer;padding:4px 6px;display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:center;}
#burger-btn span{display:block;width:18px;height:1.5px;background:var(--violet-xl,#EDE0CC);border-radius:1px;transition:all .25s;}
#burger-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
#burger-btn.open span:nth-child(2){opacity:0;}
#burger-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}
#burger-menu{display:none;position:absolute;top:100%;right:0;min-width:220px;background:var(--violet2,#2A2A3E);border:1px solid rgba(255,255,255,.08);border-radius:0 0 6px 6px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:300;padding:8px 0;}
#burger-menu.show{display:block;}
#burger-menu a,#burger-menu button{display:block;width:100%;text-align:left;padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:rgba(255,255,255,.8);background:none;border:none;cursor:pointer;letter-spacing:.02em;text-decoration:none;transition:background .15s,color .15s;}
#burger-menu a:hover,#burger-menu button:hover{background:rgba(255,255,255,.07);color:#fff;}
#burger-menu .menu-sep{height:1px;background:rgba(255,255,255,.08);margin:6px 0;}
#burger-menu .menu-badge{display:inline-block;font-size:10px;font-weight:500;background:var(--violet-m,#B8956A);color:#fff;padding:1px 7px;border-radius:2px;margin-left:8px;vertical-align:middle;}
#burger-menu .menu-badge.dark{background:rgba(255,255,255,.15);}
#topbar{position:relative;}
</style>
<script>
window._toggleBurger = function() {
  var m = document.getElementById("burger-menu");
  var b = document.getElementById("burger-btn");
  if (!m) return;
  m.style.display = (m.style.display === "block") ? "none" : "block";
  if (b) b.classList.toggle("open");
};
document.addEventListener("click", function(e) {
  var m = document.getElementById("burger-menu");
  var b = document.getElementById("burger-btn");
  if (m && b && !m.contains(e.target) && !b.contains(e.target)) {
    m.style.display = "none";
    if (b) b.classList.remove("open");
  }
});
</script>
</head>
<body>
<div class="box">
  <div class="logo">L'Œil d'Euclide</div>
  <div class="sub">Page d'initialisation — usage unique</div>

  <div class="warn">
    <strong>⚠ Page à usage unique</strong>
    Cette page permet de définir le premier super-administrateur du site.
    Supprimez ce fichier après utilisation.
  </div>

  <label for="email">Email du compte à promouvoir super-admin</label>
  <input type="email" id="email" placeholder="joachim.galmiche@hotmail.fr">

  <button id="btn" onclick="promoteAdmin()">Définir comme super-administrateur</button>

  <div class="msg" id="msg"></div>

  <p class="delete-note">
    Après utilisation, supprimez le fichier <strong>init-admin.html</strong><br>
    de votre serveur pour des raisons de sécurité.
  </p>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const _app = getApps().length ? getApps()[0] : initializeApp({
  apiKey:"AIzaSyCm5zSAJWQ6Le3-5Lb7b6DUmnGqYzBk0wk",
  authDomain:"l-oeil-d-euclyde.firebaseapp.com",
  projectId:"l-oeil-d-euclyde",
  storageBucket:"l-oeil-d-euclyde.firebasestorage.app",
  messagingSenderId:"179241004963",
  appId:"1:179241004963:web:c7c7afa926e03032653416"
});
const _auth = getAuth(_app);
const _db = getFirestore(_app);
window._db = _db; window._auth = _auth;

function buildBurger(p, auth, signOut) {
  var el = document.getElementById("topbar-right");
  if (!el) return;
  var RL = {"super-admin":"Super-administrateur","moderateur-redaction":"Moderateur de redaction","redacteur":"Redacteur","moderateur-comments":"Moderateur commentaires","lecteur-commentateur":"Lecteur-commentateur","lecteur":"Lecteur"};
  var isSA = p.role === "super-admin";
  var isMod = isSA || p.role === "moderateur-redaction";
  var isWriter = isMod || p.role === "redacteur";
  function lnk(href, txt) { return "<a href=\"" + href + "\" style=\"display:block;padding:10px 20px;color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;\">" + txt + "</a>"; }
  function sep() { return "<div style=\"height:1px;background:rgba(255,255,255,.08);margin:6px 0;\"></div>"; }
  var mi = "";
  mi += "<div style=\"padding:10px 20px 4px;font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;\">" + p.prenom + " " + p.nom + "</div>";
  mi += "<div style=\"padding:2px 20px 8px;font-size:11px;color:rgba(255,255,255,.4);\">" + (RL[p.role] || p.role) + "</div>";
  mi += sep();
  mi += lnk("profil.html", "Mon profil");
  if (isWriter) mi += lnk("creer-article.html", "Creer un article");
  if (isMod) { mi += sep(); mi += lnk("moderation.html", "Moderation"); mi += lnk("disposition.html", "Disposition"); }
  if (isSA) { mi += sep(); mi += lnk("gestion-comptes.html", "Gestion des comptes"); mi += lnk("auteurs.html", "Base auteurs"); mi += lnk("permissions.html", "Permissions"); }
  mi += sep();
  mi += "<button id=\"_deco_btn\" style=\"display:block;width:100%;text-align:left;padding:10px 20px;font-size:13px;color:rgba(255,255,255,.8);background:none;border:none;cursor:pointer;font-family:inherit;\">Deconnexion</button>";
  var bars = "<span style=\"color:rgba(255,255,255,.6);font-size:11px;margin-right:10px;\">" + p.prenom + " " + p.nom + "</span>";
  bars += "<button id=\"burger-btn\" onclick=\"window._toggleBurger()\" style=\"background:none;border:none;cursor:pointer;padding:4px 6px;display:inline-flex;flex-direction:column;gap:4px;vertical-align:middle;\">";
  bars += "<span style=\"display:block;width:18px;height:1.5px;background:#EDE0CC;border-radius:1px;\"></span>";
  bars += "<span style=\"display:block;width:18px;height:1.5px;background:#EDE0CC;border-radius:1px;\"></span>";
  bars += "<span style=\"display:block;width:18px;height:1.5px;background:#EDE0CC;border-radius:1px;\"></span>";
  bars += "</button>";
  bars += "<div id=\"burger-menu\" style=\"position:absolute;top:100%;right:0;min-width:220px;background:#2A2A3E;border:1px solid rgba(255,255,255,.08);border-radius:0 0 6px 6px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:300;padding:8px 0;\">" + mi + "</div>";
  el.innerHTML = bars;
  document.getElementById("_deco_btn").addEventListener("click", function() { signOut(auth).then(function() { window.location.href = "connexion.html"; }); });
}

onAuthStateChanged(_auth, async function(user) {
  var el = document.getElementById("topbar-right");
  if (!el) return;
  if (!user) { el.innerHTML = "<a href=\"connexion.html\" style=\"color:#EDE0CC;font-size:11px;\">Connexion</a>"; return; }
  try {
    var snap = await getDoc(doc(_db, "users", user.uid));
    if (!snap.exists()) return;
    buildBurger(snap.data(), _auth, signOut);
  } catch(e) { console.error(e); }
});
</script>
</body>
</html>
